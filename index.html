<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nathaniel Hendra's Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="bg-dark text-secondary px-4 py-5 text-center">
        <div class="py-5">
            <h1 id="home" class="display-5 fw-bold text-white">Nathaniel Hendra</h1>
            <div class="col-lg-6 mx-auto">
                <h2 class="fs-4 mb-4">UNSW Computer Science | Full-Stack Developer</h2>
                <h3 class="fs-6 mb-4">Python | C | Java | HTML | CSS | JavaScript | PostgreSQL | Algorithms | Data
                    Structures | Object-Oriented Programming</h3>
            </div>
            <img id="profile-pic" src="./assets/images/profile-img.jpg" />
        </div>
    </div>

    <h2 class="display-5 fw-bold my-5 text-white text-center">Projects</h2>

    <div id="carouselExampleCaptions" class="carousel slide">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active"
                aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1"
                aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2"
                aria-label="Slide 3"></button>
            <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="3"
                aria-label="Slide 4"></button>
        </div>
        <div class="carousel-inner">
            <!-- Slide 1: Pomodoro -->
            <div class="carousel-item active">
                <a
                    href="https://chromewebstore.google.com/detail/pomodoro-pro-focus-timer/cmfldnidgmimdfblnbicogahngjnkehl?hl=en">
                    <img src="./assets/images/Pomo.png" class="d-block w-100" alt="Pomodoro Pro">
                </a>
            </div>
            <!-- Slide 2: YouTube AI Summariser -->
            <div class="carousel-item">
                <a href="https://github.com/NathanielH12/youtube-ai-summariser">
                    <img src="./assets/images/youtube-ai-summariser-cover-img.png" class="d-block w-100"
                        alt="YouTube AI Summariser">
                </a>
            </div>
            <!-- Slide 3: Personal Portfolio -->
            <div class="carousel-item">
                <a href="https://github.com/NathanielH12/personal-portfolio">
                    <img src="./assets/images/personal-port-cover-img.png" class="d-block w-100"
                        alt="Personal Portfolio">
                </a>
            </div>
            <!-- Slide 4: MoodEats -->
            <div class="carousel-item">
                <a href="https://github.com/NathanielH12/moodEats#">
                    <img src="./assets/images/moodeats.png" class="d-block w-100" alt="MoodEats">
                </a>
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>

    <footer class="py-3 my-4">
        <ul class="nav justify-content-center border-bottom pb-3 mb-3">
            <li class="nav-item"><a href="#home" class="nav-link px-2 text-body-secondary">Home</a></li>
            <li class="nav-item"><a href="./public/about.html" class="nav-link px-2 text-body-secondary">About Me</a>
            </li>
        </ul>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
